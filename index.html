<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Taku 激励视频 WebView Demo</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --sub: #475569;
      --line: #d7deea;
      --brand: #0b7a75;
      --brand-2: #0f766e;
      --warn: #b45309;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 0% 0%, #e8f7f4, var(--bg) 40%);
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    p.tip {
      margin: 4px 0;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .full { grid-column: 1 / -1; }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: var(--sub);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      background: var(--brand);
      font-size: 13px;
      cursor: pointer;
