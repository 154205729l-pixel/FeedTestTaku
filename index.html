<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Taku 激励视频 WebView Demo</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --sub: #475569;
      --line: #d7deea;
      --brand: #0b7a75;
      --brand-2: #0f766e;
      --warn: #b45309;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 0% 0%, #e8f7f4, var(--bg) 40%);
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    p.tip {
      margin: 4px 0;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .full { grid-column: 1 / -1; }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: var(--sub);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      background: var(--brand);
      font-size: 13px;
      cursor: pointer;
    }

    button.secondary { background: #334155; }
    button.warn { background: var(--warn); }
    button.danger { background: var(--danger); }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 10px;
    }

    .status strong { color: var(--text); }

    pre {
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0b1020;
      color: #dbeafe;
      overflow: auto;
      font-size: 12px;
      line-height: 1.4;
      max-height: 290px;
    }

    .muted { color: var(--sub); font-size: 12px; }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Taku 激励视频 WebView 真机测试页</h1>
      <p class="tip">桥接名按客户端代码：<code>adRequest</code> -> <code>preLoadVideo</code> -> <code>connectVideo</code>，回调 <code>disConnectVideo</code>。</p>
      <p class="tip">必须在 App 内 WebView 打开（有 JSBridge）；浏览器里可用于调参数和看日志，但不能真正拉起广告 SDK。</p>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="requestMethod">adRequest method</label>
          <select id="requestMethod">
            <option value="get">get</option>
            <option value="post">post</option>
          </select>
        </div>
        <div>
          <label for="adRequestUrl">adRequest url</label>
          <input id="adRequestUrl" />
        </div>

        <div>
          <label for="manualSdkId">手填 sdk_id（跳过 adRequest 时用）</label>
          <input id="manualSdkId" placeholder="例如 b6861fb121e63d" />
        </div>
        <div>
          <label for="manualOrigin">手填 origin</label>
          <input id="manualOrigin" placeholder="topon / gdt / jrtt / dqd" />
        </div>

        <div>
          <label for="relateId">id（业务透传）</label>
          <input id="relateId" placeholder="业务任务 ID，可为空" />
        </div>
        <div>
          <label for="pgid">pgid（可选）</label>
          <input id="pgid" placeholder="例如 1.15.2" />
        </div>

        <div>
          <label for="rewardName">reward_name（可选）</label>
          <input id="rewardName" placeholder="coin" />
        </div>
        <div>
          <label for="rewardAmount">reward_amount（可选）</label>
          <input id="rewardAmount" placeholder="1" />
        </div>

        <div class="full">
          <label for="passData">data（可选，字符串透传）</label>
          <input id="passData" placeholder='例如 {"from":"h5-test"}（这里会原样作为字符串传）' />
        </div>

        <div class="full">
          <label for="adRequestParam">adRequest param（JSON）</label>
          <textarea id="adRequestParam"></textarea>
        </div>
      </div>

      <div class="actions" style="margin-top: 10px;">
        <button class="secondary" id="btnSave">保存配置</button>
        <button id="btnLoadAd">1. adRequest 拉广告位</button>
        <button id="btnPreload">2. preLoadVideo</button>
        <button id="btnShow">3. connectVideo</button>
        <button class="warn" id="btnRunAll">一键：请求并展示</button>
        <button class="danger" id="btnClear">清空日志</button>
      </div>
    </div>

    <div class="card">
      <div class="status">
        <div>Bridge: <strong id="bridgeState">检测中...</strong></div>
        <div>最近 sdk_id: <strong id="lastSdk">-</strong></div>
        <div>最近 origin: <strong id="lastOrigin">-</strong></div>
      </div>
      <div class="muted">当前激励 payload（将发送给 <code>preLoadVideo/connectVideo</code>）</div>
      <pre id="payloadPanel">{}</pre>
    </div>

    <div class="card">
      <div class="muted" style="margin-bottom: 8px;">运行日志</div>
      <pre id="logPanel"></pre>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = "taku_reward_h5_config_v1";
      var state = {
        bridge: null,
        bridgeRegistered: false,
        rewardPayload: null
      };

      var el = {
        requestMethod: document.getElementById("requestMethod"),
        adRequestUrl: document.getElementById("adRequestUrl"),
        adRequestParam: document.getElementById("adRequestParam"),
        manualSdkId: document.getElementById("manualSdkId"),
        manualOrigin: document.getElementById("manualOrigin"),
        relateId: document.getElementById("relateId"),
        pgid: document.getElementById("pgid"),
        rewardName: document.getElementById("rewardName"),
        rewardAmount: document.getElementById("rewardAmount"),
        passData: document.getElementById("passData"),
        bridgeState: document.getElementById("bridgeState"),
        lastSdk: document.getElementById("lastSdk"),
        lastOrigin: document.getElementById("lastOrigin"),
        payloadPanel: document.getElementById("payloadPanel"),
        logPanel: document.getElementById("logPanel"),
        btnSave: document.getElementById("btnSave"),
        btnLoadAd: document.getElementById("btnLoadAd"),
        btnPreload: document.getElementById("btnPreload"),
        btnShow: document.getElementById("btnShow"),
        btnRunAll: document.getElementById("btnRunAll"),
        btnClear: document.getElementById("btnClear")
      };

      var defaultConfig = {
        requestMethod: "get",
        adRequestUrl: "https://ap.dongdianqiu.com/plat/v3",
        adRequestParam: {
          apname: "DProApp",
          apvc: "8.5.2",
          os: "ios",
          platform: "1",
          pgid: "1.15.2",
          position: "0"
        },
        manualSdkId: "",
        manualOrigin: "topon",
        relateId: "",
        pgid: "1.15.2",
        rewardName: "coin",
        rewardAmount: "1",
        passData: ""
      };

      function now() {
        return new Date().toTimeString().slice(0, 8);
      }

      function log(msg, obj) {
        var line = "[" + now() + "] " + msg;
        if (obj !== undefined) {
          try {
            line += " " + JSON.stringify(obj);
          } catch (e) {
            line += " " + String(obj);
          }
        }
        el.logPanel.textContent += line + "\n";
        el.logPanel.scrollTop = el.logPanel.scrollHeight;
      }

      function safeJsonParse(text, fallback) {
        if (typeof text !== "string") return fallback;
        try {
          return JSON.parse(text);
        } catch (e) {
          return fallback;
        }
      }

      function updateBridgeState() {
        var ok = false;
        if (state.bridge && typeof state.bridge.callHandler === "function") ok = true;
        if (window.WebViewJavascriptBridge && typeof window.WebViewJavascriptBridge.callHandler === "function") ok = true;
        if (window.$bridge && typeof window.$bridge.callHandler === "function") ok = true;
        el.bridgeState.textContent = ok ? "已连接 JSBridge" : "未检测到 JSBridge";
      }

      function renderPayload(payload) {
        state.rewardPayload = payload || null;
        el.payloadPanel.textContent = JSON.stringify(state.rewardPayload || {}, null, 2);
        el.lastSdk.textContent = payload && payload.sdk_id ? payload.sdk_id : "-";
        el.lastOrigin.textContent = payload && payload.origin ? payload.origin : "-";
      }

      function loadConfig() {
        var raw = localStorage.getItem(STORAGE_KEY);
        var cfg = raw ? safeJsonParse(raw, null) : null;
        cfg = cfg && typeof cfg === "object" ? cfg : defaultConfig;

        el.requestMethod.value = cfg.requestMethod || defaultConfig.requestMethod;
        el.adRequestUrl.value = cfg.adRequestUrl || defaultConfig.adRequestUrl;
        el.adRequestParam.value = JSON.stringify(cfg.adRequestParam || defaultConfig.adRequestParam, null, 2);
        el.manualSdkId.value = cfg.manualSdkId || "";
        el.manualOrigin.value = cfg.manualOrigin || "topon";
        el.relateId.value = cfg.relateId || "";
        el.pgid.value = cfg.pgid || "";
        el.rewardName.value = cfg.rewardName || "";
        el.rewardAmount.value = cfg.rewardAmount || "";
        el.passData.value = cfg.passData || "";
      }

      function getConfig() {
        var adParam = safeJsonParse(el.adRequestParam.value, null);
        if (!adParam || typeof adParam !== "object") {
          throw new Error("adRequest param 不是合法 JSON");
        }
        return {
          requestMethod: (el.requestMethod.value || "get").toLowerCase(),
          adRequestUrl: el.adRequestUrl.value.trim(),
          adRequestParam: adParam,
          manualSdkId: el.manualSdkId.value.trim(),
          manualOrigin: (el.manualOrigin.value.trim() || "topon"),
          relateId: el.relateId.value.trim(),
          pgid: el.pgid.value.trim(),
          rewardName: el.rewardName.value.trim(),
          rewardAmount: el.rewardAmount.value.trim(),
          passData: el.passData.value
        };
      }

      function saveConfig() {
        var cfg = getConfig();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
        log("配置已保存", cfg);
      }

      function setupBridge(callback) {
        if (window.WebViewJavascriptBridge) {
          callback(window.WebViewJavascriptBridge);
          return;
        }
        if (window.$bridge) {
          callback(window.$bridge);
          return;
        }
        if (window.WVJBCallbacks) {
          window.WVJBCallbacks.push(callback);
          return;
        }
        window.WVJBCallbacks = [callback];
        var iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = "https://__bridge_loaded__";
        document.documentElement.appendChild(iframe);
        setTimeout(function () {
          document.documentElement.removeChild(iframe);
        }, 0);
      }

      function registerDisconnectHandler(bridge) {
        if (!bridge || typeof bridge.registerHandler !== "function") {
          log("提示：当前 bridge 不支持 registerHandler，无法注册 disConnectVideo 监听");
          return;
        }
        if (state.bridgeRegistered) return;

        bridge.registerHandler("disConnectVideo", function (cbData, responseCallback) {
          log("收到 disConnectVideo", cbData);
          if (typeof responseCallback === "function") {
            responseCallback({ ok: true });
          }
        });
        state.bridgeRegistered = true;
        log("已注册 disConnectVideo 回调监听");
      }

      function getBridgeOrThrow() {
        var bridge = state.bridge || window.WebViewJavascriptBridge || window.$bridge;
        if (!bridge || typeof bridge.callHandler !== "function") {
          throw new Error("未找到可用 JSBridge.callHandler，请确认在 App WebView 内打开");
        }
        return bridge;
      }

      function bridgeCall(handlerName, data) {
        return new Promise(function (resolve, reject) {
          try {
            var bridge = getBridgeOrThrow();
            bridge.callHandler(handlerName, data, function (resp) {
              resolve(resp);
            });
          } catch (err) {
            reject(err);
          }
        });
      }

      function unwrapAdResponse(resp) {
        if (!resp || typeof resp !== "object") return null;
        var wrapped = resp._responseWrapedByNative || resp;
        if (!wrapped || typeof wrapped !== "object") return null;
        return wrapped;
      }

      function extractRewardedItem(wrapped) {
        var data = wrapped.data;
        var list = Array.isArray(data) ? data : [];
        if (!list.length) return null;

        for (var i = 0; i < list.length; i += 1) {
          if (list[i] && list[i].ad_type === "sdk_rewarded_video") {
            return list[i];
          }
        }
        return list[0];
      }

      function buildRewardPayloadFromItem(item, cfg) {
        var adSource = (item && item.ad_source) || {};
        var sdkId = adSource.sdk_position_id || item.sdk_id || cfg.manualSdkId;
        var origin = item.origin || adSource.sdk_origin || adSource.sdk_name || cfg.manualOrigin || "topon";

        if (!sdkId) {
          throw new Error("未拿到 sdk_id（ad_source.sdk_position_id 为空）");
        }

        return {
          id: cfg.relateId || item.request_id || "",
          sdk_id: sdkId,
          origin: origin,
          reward_name: cfg.rewardName || "",
          reward_amount: cfg.rewardAmount || "",
          data: cfg.passData || "",
          imp_mon_arr: Array.isArray(item.imp_mon_arr) ? item.imp_mon_arr : [],
          click_mon_arr: Array.isArray(item.click_mon_arr) ? item.click_mon_arr : [],
          pgid: item.pgid || cfg.pgid || ""
        };
      }

      function buildManualPayload(cfg) {
        if (!cfg.manualSdkId) {
          throw new Error("手动模式至少要填写 sdk_id");
        }
        return {
          id: cfg.relateId || "",
          sdk_id: cfg.manualSdkId,
          origin: cfg.manualOrigin || "topon",
          reward_name: cfg.rewardName || "",
          reward_amount: cfg.rewardAmount || "",
          data: cfg.passData || "",
          imp_mon_arr: [],
          click_mon_arr: [],
          pgid: cfg.pgid || ""
        };
      }

      async function doAdRequest() {
        var cfg = getConfig();
        if (!cfg.adRequestUrl) {
          throw new Error("adRequest url 不能为空");
        }

        var req = {
          method: cfg.requestMethod,
          url: cfg.adRequestUrl,
          param: cfg.adRequestParam,
          callback: "onAdRequestDone"
        };

        log("调用 adRequest", req);
        var resp = await bridgeCall("adRequest", req);
        log("adRequest 返回", resp);

        var wrapped = unwrapAdResponse(resp);
        if (!wrapped) {
          throw new Error("adRequest 返回结构不符合预期");
        }

        if (typeof wrapped.code !== "undefined" && Number(wrapped.code) !== 0) {
          throw new Error("adRequest code != 0: " + wrapped.code);
        }

        var item = extractRewardedItem(wrapped);
        if (!item) {
          throw new Error("adRequest 未返回可用广告位数据（data 为空）");
        }

        var payload = buildRewardPayloadFromItem(item, cfg);
        renderPayload(payload);
        log("已生成激励 payload", payload);
        return payload;
      }

      async function doPreload() {
        var payload = state.rewardPayload;
        if (!payload) {
          var cfg = getConfig();
          payload = buildManualPayload(cfg);
          renderPayload(payload);
          log("使用手动 payload", payload);
        }

        log("调用 preLoadVideo", payload);
        var resp = await bridgeCall("preLoadVideo", payload);
        log("preLoadVideo 返回", resp);
      }

      async function doShow() {
        var payload = state.rewardPayload;
        if (!payload) {
          var cfg = getConfig();
          payload = buildManualPayload(cfg);
          renderPayload(payload);
          log("使用手动 payload", payload);
        }

        log("调用 connectVideo", payload);
        var resp = await bridgeCall("connectVideo", payload);
        log("connectVideo 返回", resp);
      }

      async function doRunAll() {
        var payload = await doAdRequest();
        log("准备预加载", payload);
        await doPreload();
        setTimeout(function () {
          doShow().catch(function (err) {
            log("connectVideo 失败", { message: err.message || String(err) });
          });
        }, 400);
      }

      function bindEvents() {
        el.btnSave.addEventListener("click", function () {
          try {
            saveConfig();
          } catch (err) {
            log("保存失败", { message: err.message || String(err) });
          }
        });

        el.btnLoadAd.addEventListener("click", function () {
          doAdRequest().catch(function (err) {
            log("adRequest 失败", { message: err.message || String(err) });
          });
        });

        el.btnPreload.addEventListener("click", function () {
          doPreload().catch(function (err) {
            log("preLoadVideo 失败", { message: err.message || String(err) });
          });
        });

        el.btnShow.addEventListener("click", function () {
          doShow().catch(function (err) {
            log("connectVideo 失败", { message: err.message || String(err) });
          });
        });

        el.btnRunAll.addEventListener("click", function () {
          doRunAll().catch(function (err) {
            log("一键流程失败", { message: err.message || String(err) });
          });
        });

        el.btnClear.addEventListener("click", function () {
          el.logPanel.textContent = "";
        });
      }

      function init() {
        loadConfig();
        bindEvents();

        setupBridge(function (bridge) {
          state.bridge = bridge;
          updateBridgeState();
          registerDisconnectHandler(bridge);
          log("Bridge 初始化完成", {
            hasCallHandler: !!(bridge && bridge.callHandler),
            hasRegisterHandler: !!(bridge && bridge.registerHandler)
          });
        });

        setTimeout(updateBridgeState, 300);
        setTimeout(updateBridgeState, 1000);

        log("页面初始化完成", {
          userAgent: navigator.userAgent,
          url: location.href
        });
      }

      init();
    })();
  </script>
</body>
</html>
